<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Financildes</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{
    --bg:#1a1a1a; --bg-2:#202020; --bg-3:#262626; --bg-4:#2f2f2f;
    --line:#333; --line-2:#3c3c3c;
    --tx:#e8e8e8; --tx-2:#a2a2a2; --tx-3:#6c6c6c;
    --accent:#ededed;
    --r:14px; --r-sm:10px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
    font-size:15px; line-height:1.4; overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    padding-top:var(--safe-t);}
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--tx);background:var(--bg-3);
    border:1px solid var(--line-2);border-radius:var(--r-sm);padding:11px 12px;width:100%;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:#555;}
  ::placeholder{color:var(--tx-3);}
  .muted{color:var(--tx-2);} .faint{color:var(--tx-3);}
  .row{display:flex;align-items:center;gap:10px;}
  .icon{display:inline-flex;align-items:center;justify-content:center;flex:none;width:1.15em;height:1.15em;}
  .icon svg{width:100%;height:100%;display:block;}

  /* ---------- Top bar ---------- */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 70%,transparent);
    padding:14px 16px 8px;}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
  .brand .mark{width:24px;height:24px;color:var(--tx-2);}
  .brand h1{font-size:16px;font-weight:600;letter-spacing:.2px;margin:0;}
  .brand .spacer{flex:1;}
  .gear{width:38px;height:38px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx-2);}
  .gear .icon{width:18px;height:18px;}

  /* period chips */
  .periods{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
  .periods::-webkit-scrollbar{display:none;}
  .chip{flex:none;padding:7px 14px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line);
    color:var(--tx-2);font-size:13px;font-weight:500;}
  .chip.on{background:var(--accent);color:#181818;border-color:var(--accent);}

  /* ---------- Balance ---------- */
  .balances{padding:6px 16px 2px;display:flex;gap:10px;}
  .bal{flex:1;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;}
  .bal .lab{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--tx-3);margin-bottom:5px;}
  .bal .val{font-size:21px;font-weight:600;letter-spacing:-.3px;}
  .bal .val.sub{font-size:18px;color:var(--tx-2);font-weight:500;}

  /* period nav */
  .pnav{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 16px 2px;}
  .pnav button{width:34px;height:34px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx-2);}
  .pnav .lbl{min-width:140px;text-align:center;font-size:14px;font-weight:500;text-transform:capitalize;}
  .pnav .icon{width:16px;height:16px;}

  /* ---------- Donut ---------- */
  .donutwrap{display:flex;flex-direction:column;align-items:center;padding:10px 16px 4px;}
  .donut{position:relative;width:230px;height:230px;}
  .donut svg{transform:rotate(-90deg);}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donut .center .t{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--tx-3);}
  .donut .center .n{font-size:25px;font-weight:600;letter-spacing:-.4px;margin-top:2px;}
  .donut .center .n.empty{font-size:14px;color:var(--tx-3);font-weight:500;max-width:150px;text-align:center;}

  /* anillo de categorías alrededor de la dona (estilo Monefy) */
  .donutarea{position:relative;width:min(310px,90vw);aspect-ratio:1;margin:6px auto 4px;}
  .donutarea .donut{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:152px;height:152px;}
  .donutarea .donut .center .t{font-size:10px;}
  .donutarea .donut .center .n{font-size:21px;}
  .donutarea .donut .center .n.empty{font-size:12px;max-width:120px;}
  .center .cinc{font-size:16px;font-weight:600;letter-spacing:-.3px;color:var(--tx);}
  .center .cexp{font-size:16px;font-weight:600;letter-spacing:-.3px;color:var(--tx-2);}
  .center .cdiv{width:42px;height:1px;background:var(--line-2);margin:5px 0;}
  .catbtn{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;
    align-items:center;gap:3px;width:58px;}
  .catbtn .cc{width:46px;height:46px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;color:var(--tx);}
  .catbtn .cc .icon{width:21px;height:21px;}
  .catbtn .cl{font-size:9px;line-height:1.15;color:var(--tx-2);max-width:58px;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .catbtn:active .cc{background:var(--bg-4);border-color:var(--accent);}

  .legrow{display:flex;align-items:center;gap:11px;padding:9px 6px;border-radius:var(--r-sm);}
  .legrow:active{background:var(--bg-2);}
  .legrow .dot{width:9px;height:9px;border-radius:3px;flex:none;}
  .legrow .ci{width:30px;height:30px;border-radius:8px;background:var(--bg-3);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx);flex:none;}
  .legrow .ci .icon{width:16px;height:16px;}
  .legrow .nm{flex:1;font-weight:500;}
  .legrow .pct{color:var(--tx-3);font-size:12px;min-width:38px;text-align:right;}
  .legrow .am{font-weight:600;min-width:74px;text-align:right;}

  /* ---------- Cards strip ---------- */
  .section-h{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px;}
  .section-h .ttl{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--tx-3);}
  .section-h .more{font-size:13px;color:var(--tx-2);}
  .cardstrip{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;}
  .cardstrip::-webkit-scrollbar{display:none;}
  .pcard{flex:none;min-width:150px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 14px;}
  .pcard .top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .pcard .ci{width:30px;height:30px;border-radius:8px;background:var(--bg-3);display:flex;align-items:center;
    justify-content:center;color:var(--tx);}
  .pcard .ci .icon{width:16px;height:16px;}
  .pcard .nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pcard .ty{font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:var(--tx-3);}
  .pcard .bal{font-size:17px;font-weight:600;letter-spacing:-.2px;}
  .pcard .bal.neg{color:#cf8d8d;}

  /* ---------- bottom action bar ---------- */
  /* ---------- footer fijo (acciones + nav) ---------- */
  #bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:480px;margin:0 auto;}
  .actions{display:flex;gap:10px;padding:10px 16px;background:var(--bg);border-top:1px solid var(--line);}
  .act{flex:1;height:52px;border-radius:var(--r);font-size:15px;font-weight:600;display:flex;
    align-items:center;justify-content:center;gap:8px;}
  .act .icon{width:18px;height:18px;}
  .act.exp{background:var(--bg-3);border:1px solid var(--line-2);color:var(--tx);}
  .act.inc{background:var(--accent);color:#181818;}

  /* ---------- bottom nav ---------- */
  nav.tabs{display:flex;background:var(--bg-2);
    border-top:1px solid var(--line);padding-bottom:var(--safe-b);}
  nav.tabs button{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--tx-3);font-size:10.5px;font-weight:500;}
  nav.tabs button .icon{width:21px;height:21px;}
  nav.tabs button.on{color:var(--tx);}

  /* reservar espacio para que el footer fijo no tape el contenido */
  main{flex:1;padding-bottom:calc(66px + var(--safe-b));}
  #app.with-actions main{padding-bottom:calc(150px + var(--safe-b));}

  /* ---------- transaction list ---------- */
  .daygroup{margin:0 16px 6px;}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;padding:14px 2px 7px;
    border-bottom:1px solid var(--line);}
  .dayhead .d{font-size:13px;font-weight:600;text-transform:capitalize;}
  .dayhead .s{font-size:12px;color:var(--tx-3);}
  .txrow{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--bg-2);}
  .txrow:active{background:var(--bg-2);}
  .txrow .ci{width:38px;height:38px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx);flex:none;}
  .txrow .ci .icon{width:19px;height:19px;}
  .txrow .mid{flex:1;min-width:0;}
  .txrow .mid .t1{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txrow .mid .t2{font-size:12px;color:var(--tx-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .txrow .amt{font-weight:600;flex:none;text-align:right;}
  .txrow .amt.inc{color:var(--tx);}
  .txrow .amt.exp{color:var(--tx-2);}
  .empty{text-align:center;color:var(--tx-3);padding:60px 30px;font-size:14px;}
  .empty .big{display:block;margin-bottom:6px;color:var(--tx-2);font-size:15px;font-weight:500;}

  /* ---------- manage ---------- */
  .subtabs{display:flex;gap:6px;padding:14px 16px 4px;}
  .subtab{flex:1;padding:9px 0;text-align:center;border-radius:var(--r-sm);background:var(--bg-3);
    border:1px solid var(--line);color:var(--tx-2);font-size:13px;font-weight:500;}
  .subtab.on{background:var(--bg-4);color:var(--tx);border-color:var(--line-2);}
  .mlist{padding:8px 16px;}
  .mitem{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--bg-2);
    border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;}
  .mitem .ci{width:36px;height:36px;border-radius:9px;background:var(--bg-3);display:flex;align-items:center;
    justify-content:center;color:var(--tx);flex:none;}
  .mitem .ci .icon{width:18px;height:18px;}
  .mitem .mid{flex:1;min-width:0;}
  .mitem .mid .t1{font-weight:500;}
  .mitem .mid .t2{font-size:12px;color:var(--tx-3);margin-top:1px;}
  .mitem .edit{width:32px;height:32px;border-radius:8px;background:var(--bg-3);display:flex;
    align-items:center;justify-content:center;color:var(--tx-2);flex:none;}
  .mitem .edit .icon{width:16px;height:16px;}
  .addbtn{width:100%;padding:13px;border-radius:var(--r-sm);background:var(--bg-3);border:1px dashed var(--line-2);
    color:var(--tx-2);font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;}
  .addbtn .icon{width:16px;height:16px;}
  .mlabel{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--tx-3);
    padding:14px 3px 8px;font-weight:600;}

  /* ---------- modal / sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;opacity:0;pointer-events:none;
    transition:opacity .18s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:480px;margin:0 auto;
    background:var(--bg-2);border-top-left-radius:20px;border-top-right-radius:20px;
    border-top:1px solid var(--line-2);transform:translateY(100%);transition:transform .22s cubic-bezier(.3,.8,.4,1);
    max-height:94vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);}
  .sheet.show{transform:translateY(0);}
  .grab{width:36px;height:4px;border-radius:2px;background:var(--line-2);margin:9px auto 2px;flex:none;}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 10px;flex:none;}
  .sheet-h .t{font-size:16px;font-weight:600;}
  .sheet-h .x{width:32px;height:32px;border-radius:50%;background:var(--bg-3);display:flex;align-items:center;
    justify-content:center;color:var(--tx-2);}
  .sheet-h .x .icon{width:16px;height:16px;}
  .sheet-body{overflow-y:auto;padding:0 16px 16px;}

  .seg{display:flex;background:var(--bg-3);border-radius:var(--r-sm);padding:3px;margin-bottom:14px;}
  .seg button{flex:1;padding:9px;border-radius:8px;color:var(--tx-2);font-weight:500;font-size:14px;}
  .seg button.on{background:var(--bg-4);color:var(--tx);}

  .amount-display{text-align:center;padding:6px 0 12px;}
  .amount-display .cur{font-size:14px;color:var(--tx-3);}
  .amount-display .num{font-size:38px;font-weight:600;letter-spacing:-1px;}

  .field{margin-bottom:12px;}
  .field > label{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;
    color:var(--tx-3);margin-bottom:6px;font-weight:600;}

  .picker{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .picker::-webkit-scrollbar{display:none;}
  .pick{flex:none;display:flex;flex-direction:column;align-items:center;gap:5px;width:64px;}
  .pick .ci{width:48px;height:48px;border-radius:12px;background:var(--bg-3);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx);}
  .pick .ci .icon{width:22px;height:22px;}
  .pick.on .ci{border-color:var(--accent);background:var(--bg-4);box-shadow:0 0 0 1px var(--accent);}
  .pick .pl{font-size:11px;color:var(--tx-2);text-align:center;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:64px;}
  .pick.on .pl{color:var(--tx);}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .key{height:50px;border-radius:var(--r-sm);background:var(--bg-3);font-size:21px;font-weight:500;
    display:flex;align-items:center;justify-content:center;}
  .key:active{background:var(--bg-4);}
  .key .icon{width:22px;height:22px;color:var(--tx-2);}

  .btn{width:100%;height:50px;border-radius:var(--r);font-size:15px;font-weight:600;margin-top:8px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn .icon{width:18px;height:18px;}
  .btn.primary{background:var(--accent);color:#181818;}
  .btn.ghost{background:var(--bg-3);border:1px solid var(--line-2);color:var(--tx);}
  .btn.danger{background:transparent;border:1px solid #5a3a3a;color:#cf8d8d;}
  .btn[disabled]{opacity:.4;}
  .amt.inc{color:var(--tx);} .amt.exp{color:var(--tx-2);}

  .icongrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;max-height:200px;overflow-y:auto;
    padding:4px;background:var(--bg-3);border-radius:var(--r-sm);}
  .icongrid .ig{aspect-ratio:1;border-radius:9px;background:var(--bg-2);display:flex;align-items:center;
    justify-content:center;color:var(--tx-2);}
  .icongrid .ig .icon{width:20px;height:20px;}
  .icongrid .ig.on{background:var(--bg-4);color:var(--tx);box-shadow:0 0 0 1px var(--accent);}

  .grayrow{display:flex;gap:8px;flex-wrap:wrap;}
  .gray{width:30px;height:30px;border-radius:8px;}
  .gray.on{box-shadow:0 0 0 2px var(--bg-2),0 0 0 4px var(--accent);}

  .toast{position:fixed;left:50%;bottom:calc(78px + var(--safe-b));transform:translateX(-50%) translateY(20px);
    background:var(--bg-4);border:1px solid var(--line-2);color:var(--tx);padding:11px 18px;border-radius:999px;
    font-size:13px;font-weight:500;z-index:80;opacity:0;transition:.22s;white-space:nowrap;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-size:12px;color:var(--tx-3);margin-top:6px;line-height:1.45;}
  .twocol{display:flex;gap:10px;}
  .twocol > *{flex:1;}
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
  <div id="bottom"></div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sheet-h"><div class="t" id="sheetTitle"></div>
    <button class="x" id="sheetClose"></button></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =================================================================
   FINANCILDES — Paso 1 (MVP local). Offline-first, localStorage.
   Modelo de datos pensado para incorporar deudas (Paso 2) y
   sincronización con Google Sheets (Paso 3) sin migraciones.
   ================================================================= */

const nf=new Intl.NumberFormat('es-CL');
function clp(n){const neg=n<0; n=Math.abs(Math.round(n)); return (neg?'-':'')+'$'+nf.format(n);}

/* ---------- Cálculo de saldos (derivado de movimientos) ---------- */
function effectOnCard(t,cardId){
  if(t.cardId!==cardId && t.toCardId!==cardId) return 0;
  if(t.kind==='gasto')    return t.cardId===cardId ? -t.amount : 0;
  if(t.kind==='ingreso')  return t.cardId===cardId ? +t.amount : 0;
  if(t.kind==='transferencia'){
    let e=0; if(t.cardId===cardId)e-=t.amount; if(t.toCardId===cardId)e+=t.amount; return e;
  }
  if(t.kind==='ajuste')   return t.cardId===cardId ? (t.increase?+t.amount:-t.amount) : 0;
  /* Deudas (Paso 2). La tarjeta es opcional: si no hay cardId, no mueve saldo. */
  if(t.kind==='prestamo')    return t.cardId===cardId ? -t.amount : 0; /* presté: sale plata */
  if(t.kind==='deuda')       return t.cardId===cardId ? +t.amount : 0; /* me prestaron: entra plata */
  if(t.kind==='abono_cobro') return t.cardId===cardId ? +t.amount : 0; /* me pagan: entra plata */
  if(t.kind==='abono_pago')  return t.cardId===cardId ? -t.amount : 0; /* yo pago: sale plata */
  return 0;
}
function cardBalance(cardId){
  const c=DB.cards.find(c=>c.id===cardId); if(!c) return 0;
  let b=c.opening||0;
  for(const t of DB.transactions) b+=effectOnCard(t,cardId);
  return b;
}
function disponible(){return DB.cards.reduce((s,c)=>s+cardBalance(c.id),0);}

/* Saldo con una persona: + = te debe (por cobrar) · − = le debes (por pagar) */
function personEffect(t){
  if(t.kind==='prestamo')    return +t.amount; /* le presté: me debe más */
  if(t.kind==='deuda')       return -t.amount; /* me prestó: le debo */
  if(t.kind==='abono_cobro') return -t.amount; /* me paga lo que me debía */
  if(t.kind==='abono_pago')  return +t.amount; /* le pago lo que le debía */
  return 0;
}
function personBalance(personId){
  let b=0;
  for(const t of DB.transactions){ if(t.personId===personId) b+=personEffect(t); }
  return b;
}
function porCobrar(){return DB.people.reduce((s,p)=>{const b=personBalance(p.id);return s+(b>0?b:0);},0);}
function porPagar(){return DB.people.reduce((s,p)=>{const b=personBalance(p.id);return s+(b<0?-b:0);},0);}
function patrimonio(){return disponible()+porCobrar()-porPagar();}

/* ---------- Rangos de periodo ---------- */
function startOfWeek(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function periodRange(){
  const a=new Date(UI.anchor); let start,end,label;
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  if(UI.period==='dia'){start=new Date(a);start.setHours(0,0,0,0);end=new Date(start);end.setDate(end.getDate()+1);
    label=a.getDate()+' '+meses[a.getMonth()]+' '+a.getFullYear();}
  else if(UI.period==='semana'){start=startOfWeek(a);end=new Date(start);end.setDate(end.getDate()+7);
    const e2=new Date(end);e2.setDate(e2.getDate()-1);
    label=start.getDate()+' '+meses[start.getMonth()].slice(0,3)+' – '+e2.getDate()+' '+meses[e2.getMonth()].slice(0,3);}
  else if(UI.period==='mes'){start=new Date(a.getFullYear(),a.getMonth(),1);end=new Date(a.getFullYear(),a.getMonth()+1,1);
    label=meses[a.getMonth()]+' '+a.getFullYear();}
  else if(UI.period==='ano'){start=new Date(a.getFullYear(),0,1);end=new Date(a.getFullYear()+1,0,1);
    label=String(a.getFullYear());}
  else{start=new Date(2000,0,1);end=new Date(2100,0,1);label='Todo el historial';}
  return {start,end,label};
}
function shiftPeriod(dir){
  const a=new Date(UI.anchor);
  if(UI.period==='dia')a.setDate(a.getDate()+dir);
  else if(UI.period==='semana')a.setDate(a.getDate()+7*dir);
  else if(UI.period==='mes')a.setMonth(a.getMonth()+dir);
  else if(UI.period==='ano')a.setFullYear(a.getFullYear()+dir);
  UI.anchor=a; render();
}
function txInPeriod(){
  const {start,end}=periodRange();
  return DB.transactions.filter(t=>{const d=new Date(t.date+'T12:00:00');return d>=start&&d<end;});
}

/* SVG del donut con segmentos en grises */
function donutSVG(segs,total,size){
  size=size||230;const sw=Math.round(size*0.113),r=(size-sw)/2,cx=size/2,cy=size/2,C=2*Math.PI*r;
  let html='<svg width="'+size+'" height="'+size+'">';
  html+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#262626" stroke-width="'+sw+'"/>';
  if(total>0){
    let off=0;
    for(const s of segs){
      const frac=s.amount/total, len=frac*C, gap=C-len;
      html+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c.color+'" stroke-width="'+sw+'" '+
        'stroke-dasharray="'+len+' '+gap+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="butt"/>';
      off+=len;
    }
  }
  html+='</svg>';
  return html;
}

/* ---------- Lista de movimientos ---------- */
function renderList(){
  const {label}=periodRange();
  const tx=txInPeriod().slice().sort((a,b)=> (a.date<b.date?1:a.date>b.date?-1:(b.createdAt||'').localeCompare(a.createdAt||'')));
  let html='<div class="pnav">'+
    '<button data-shift="-1">'+svg('chevron-left')+'</button>'+
    '<div class="lbl">'+label+'</div>'+
    '<button data-shift="1">'+svg('chevron-right')+'</button></div>';

  if(!tx.length){
    html+='<div class="empty"><span class="big">Aún no hay movimientos aquí</span>'+
      'Toca Gasto o Ingreso abajo para registrar el primero.</div>';
    $('#main').innerHTML=html; return;
  }
  /* agrupar por día */
  const groups={};
  for(const t of tx){(groups[t.date]=groups[t.date]||[]).push(t);}
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  for(const date of Object.keys(groups)){
    const arr=groups[date];
    const d=new Date(date+'T12:00:00');
    let dayNet=0; for(const t of arr){ if(t.kind==='ingreso')dayNet+=t.amount; else if(t.kind==='gasto')dayNet-=t.amount; }
    const head=dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()];
    html+='<div class="daygroup"><div class="dayhead"><span class="d">'+head+'</span>'+
      '<span class="s">'+(dayNet>=0?'+':'')+clp(dayNet)+'</span></div>';
    for(const t of arr){
      html+=txRow(t);
    }
    html+='</div>';
  }
  $('#main').innerHTML=html;
}
function txRow(t){
  let icon='ellipsis',name='',sub='',amtCls='exp',amtTxt='';
  const card=DB.cards.find(c=>c.id===t.cardId);
  if(t.kind==='transferencia'){
    const to=DB.cards.find(c=>c.id===t.toCardId);
    icon='arrow-left-right'; name='Transferencia';
    sub=(card?esc(card.name):'?')+' → '+(to?esc(to.name):'?');
    amtCls='exp'; amtTxt=clp(t.amount);
  } else if(t.kind==='ajuste'){
    icon='sliders-horizontal'; name='Ajuste de saldo';
    sub=card?esc(card.name):''; amtCls=t.increase?'inc':'exp';
    amtTxt=(t.increase?'+':'-')+clp(t.amount).replace('-','');
  } else if(t.kind==='prestamo'||t.kind==='deuda'||t.kind==='abono_cobro'||t.kind==='abono_pago'){
    const p=DB.people.find(p=>p.id===t.personId);
    const pname=p?esc(p.name):'(persona)';
    const labels={prestamo:'Presté a '+pname,deuda:'Me prestó '+pname,
      abono_cobro:pname+' me pagó',abono_pago:'Le pagué a '+pname};
    const icons={prestamo:'hand-coins',deuda:'hand-coins',abono_cobro:'coins',abono_pago:'coins'};
    icon=icons[t.kind]; name=labels[t.kind];
    sub=[card?esc(card.name):'Sin tarjeta', t.note?esc(t.note):null].filter(Boolean).join(' · ');
    /* entra plata (inc) en deuda y abono_cobro; sale (exp) en prestamo y abono_pago */
    const entra=(t.kind==='deuda'||t.kind==='abono_cobro');
    amtCls=entra?'inc':'exp'; amtTxt=(entra?'+':'-')+clp(t.amount).replace('-','');
  } else {
    const c=DB.categories.find(c=>c.id===t.categoryId);
    icon=c?c.icon:'ellipsis'; name=c?esc(c.name):'(categoría borrada)';
    sub=[card?esc(card.name):null, t.note?esc(t.note):null].filter(Boolean).join(' · ');
    if(t.kind==='ingreso'){amtCls='inc';amtTxt='+'+clp(t.amount).replace('-','');}
    else{amtCls='exp';amtTxt='-'+clp(t.amount).replace('-','');}
  }
  return '<div class="txrow" data-tx="'+t.id+'"><span class="ci">'+svg(icon)+'</span>'+
    '<div class="mid"><div class="t1">'+name+'</div>'+(sub?'<div class="t2">'+sub+'</div>':'')+'</div>'+
    '<div class="amt '+amtCls+'">'+amtTxt+'</div></div>';
}

/* ---------- Deudas y personas (Paso 2) ---------- */
function initials(name){
  const parts=name.trim().split(/\s+/);
  return ((parts[0]||'')[0]||'?').toUpperCase()+((parts[1]||'')[0]||'').toUpperCase();
}
function renderDeudas(){
  const cobrar=porCobrar(), pagar=porPagar();
  let html='';
  html+='<div class="balances" style="padding-top:14px">'+
    '<div class="bal"><div class="lab">Te deben</div><div class="val">'+clp(cobrar)+'</div></div>'+
    '<div class="bal"><div class="lab">Debes</div><div class="val sub">'+clp(pagar)+'</div></div></div>';

  if(!DB.people.length){
    html+='<div class="empty"><span class="big">Aún no hay personas</span>'+
      'Registra a quién le prestas o quién te presta para llevar la cuenta.</div>'+
      '<div class="mlist"><button class="btn primary" data-newdebt="1">'+svg('hand-coins')+'Registrar primer movimiento</button>'+
      '<button class="addbtn" data-newperson="1">'+svg('plus')+'Solo crear una persona</button></div>';
    $('#main').innerHTML=html; return;
  }
  /* ordenar por saldo absoluto desc */
  const people=DB.people.slice().sort((a,b)=>Math.abs(personBalance(b.id))-Math.abs(personBalance(a.id)));
  html+='<div class="mlist">';
  html+='<button class="btn primary" data-newdebt="1" style="margin-bottom:12px">'+svg('hand-coins')+'Nuevo movimiento de deuda</button>';
  for(const p of people){
    const b=personBalance(p.id);
    let tag,cls;
    if(b>0){tag='te debe '+clp(b);cls='inc';}
    else if(b<0){tag='le debes '+clp(-b);cls='exp';}
    else{tag='al día';cls='';}
    html+='<div class="mitem" data-person="'+p.id+'">'+
      '<span class="ci" style="border-radius:50%;font-size:12px;font-weight:600">'+initials(p.name)+'</span>'+

/* Detalle de una persona: historial + acciones */
function openPersonSheet(personId){
  const p=DB.people.find(p=>p.id===personId); if(!p)return;
  const b=personBalance(personId);
  const movs=DB.transactions.filter(t=>t.personId===personId)
    .sort((a,b)=>(a.date<b.date?1:a.date>b.date?-1:(b.createdAt||'').localeCompare(a.createdAt||'')));
  let estado,ecls;
  if(b>0){estado='Te debe '+clp(b);ecls='inc';}
  else if(b<0){estado='Le debes '+clp(-b);ecls='exp';}
  else{estado='Al día';ecls='';}

  let h='<div style="text-align:center;padding:4px 0 14px">'+
    '<div style="font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--tx-3)">Saldo</div>'+
    '<div style="font-size:28px;font-weight:600;letter-spacing:-.5px;margin-top:3px" class="amt '+ecls+'">'+estado+'</div></div>';

  /* acciones */
  h+='<div class="twocol" style="margin-bottom:8px">'+
    '<button class="btn ghost" data-debtmove="prestamo" data-pid="'+personId+'">'+svg('hand-coins')+'Prestarle</button>'+
    '<button class="btn ghost" data-debtmove="deuda" data-pid="'+personId+'">'+svg('hand-coins')+'Pedirle</button></div>';
  if(b>0)
    h+='<button class="btn primary" data-debtmove="abono_cobro" data-pid="'+personId+'">'+svg('coins')+'Registrar pago que me hace</button>';
  else if(b<0)
    h+='<button class="btn primary" data-debtmove="abono_pago" data-pid="'+personId+'">'+svg('coins')+'Registrar pago que le hago</button>';
  if(b!==0)
    h+='<button class="btn ghost" data-settle="'+personId+'">'+svg('check')+'Saldar todo</button>';

  /* historial */
  h+='<div class="mlabel">Historial</div>';
  if(!movs.length)h+='<div class="hint" style="padding:4px 2px">Sin movimientos todavía.</div>';
  else{
    const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    h+='<div style="margin:0 -4px">'+movs.map(t=>{
      const d=new Date(t.date+'T12:00:00');
      const card=DB.cards.find(c=>c.id===t.cardId);
      const labels={prestamo:'Le presté',deuda:'Me prestó',abono_cobro:'Me pagó',abono_pago:'Le pagué'};
      const entra=(t.kind==='deuda'||t.kind==='abono_cobro');
      return '<div class="txrow" data-debttx="'+t.id+'"><span class="ci">'+svg(entra?'coins':'hand-coins')+'</span>'+
        '<div class="mid"><div class="t1">'+labels[t.kind]+'</div>'+
        '<div class="t2">'+d.getDate()+' '+meses[d.getMonth()]+(card?' · '+esc(card.name):' · sin tarjeta')+(t.note?' · '+esc(t.note):'')+'</div></div>'+
        '<div class="amt '+(entra?'inc':'exp')+'">'+(entra?'+':'-')+clp(t.amount).replace('-','')+'</div></div>';
    }).join('')+'</div>';
  }
  /* editar/eliminar persona */
  h+='<button class="btn ghost" data-editperson="'+personId+'" style="margin-top:14px">'+svg('pencil')+'Editar nombre</button>';
  h+='<button class="btn danger" data-delperson="'+personId+'">'+svg('trash-2')+'Eliminar persona</button>';

  openSheet(esc(p.name), '<div id="personbody">'+h+'</div>');
}

  h+='<div class="field"><label>Tarjeta (opcional)</label><div class="picker">'+
    '<button class="pick '+(s.cardId===''?'on':'')+'" data-debtcard="__none__"><span class="ci">'+svg('circle-dollar-sign')+
      '</span><span class="pl">Sin tarjeta</span></button>'+
    DB.cards.map(c=>'<button class="pick '+(s.cardId===c.id?'on':'')+'" data-debtcard="'+c.id+'">'+
      '<span class="ci">'+svg(c.icon)+'</span><span class="pl">'+esc(c.name)+'</span></button>').join('')+
    '</div><div class="hint">'+debtCardHint(s.dir)+'</div></div>';
  /* fecha + nota */
  h+='<div class="field"><label>Fecha</label><input type="date" id="debtdate" value="'+s.date+'"></div>';
  h+='<div class="field"><label>Nota</label><input type="text" id="debtnote" placeholder="Opcional" value="'+esc(s.note)+'"></div>';
  /* teclado */
  h+='<div class="keypad">'+
    ['1','2','3','4','5','6','7','8','9'].map(k=>'<button class="key" data-dk="'+k+'">'+k+'</button>').join('')+

    '<button class="key" data-dk="del">'+svg('chevron-left')+'</button></div>';
  h+='<button class="btn primary" id="debtsave" '+(s.amount>0&&s.personId?'':'disabled')+'>Guardar movimiento</button>';

function debtCardHint(dir){
  if(dir==='prestamo')return 'Si eliges tarjeta, la plata sale de ahí. Sin tarjeta, solo queda como “te deben”.';
  if(dir==='deuda')return 'Si eliges tarjeta, la plata entra ahí. Sin tarjeta, solo queda como “debes”.';
  if(dir==='abono_cobro')return 'Si eliges tarjeta, el pago entra ahí. Sin tarjeta, solo baja lo que te deben.';
  return 'Si eliges tarjeta, el pago sale de ahí. Sin tarjeta, solo baja lo que debes.';
}
function debtSave(){
  const s=sheetState;
  if(s.amount<=0||!s.personId){toast('Falta monto o persona');return;}
  const cardId=s.cardId||null;
  /* validar débito si la plata sale (prestamo / abono_pago) */
  if(cardId&&(s.dir==='prestamo'||s.dir==='abono_pago')){
    const card=DB.cards.find(c=>c.id===cardId);
    if(card&&card.type==='debito'&&cardBalance(cardId)-s.amount<0){
      toast('Saldo insuficiente en '+card.name+' (débito)');return;}
  }
  DB.transactions.push({id:uid(),kind:s.dir,amount:s.amount,categoryId:null,cardId:cardId,
    toCardId:null,personId:s.personId,date:s.date,note:s.note,createdAt:nowISO(),updatedAt:nowISO(),synced:false});
  save(); closeSheet(); render(); toast('Movimiento registrado');
}
/* Saldar todo: crea el abono que lleva el saldo a 0 (sin tarjeta por defecto) */
function openSettleSheet(personId){
  const b=personBalance(personId);
  if(b===0){toast('Ya está al día');return;}
  const dir=b>0?'abono_cobro':'abono_pago';
  sheetState={mode:'debt',dir,personId,amount:Math.abs(b),cardId:'',date:todayISO(),note:'Saldado'};
  openSheet('Saldar con '+esc(DB.people.find(p=>p.id===personId).name),'<div id="debtform"></div>');
  renderDebtForm();
}

function txSaveCurrent(){
  const s=sheetState;
  if(s.amount<=0)return;
  if(!s.cardId){toast('Crea una tarjeta primero');return;}
  if(!s.categoryId){toast('Elige una categoría');return;}
  /* validación débito sin sobregiro (solo gasto, solo al crear/editar) */
  if(s.kind==='gasto'){
    const card=DB.cards.find(c=>c.id===s.cardId);
    if(card&&card.type==='debito'){
      let bal=cardBalance(s.cardId);
      if(s.id){const old=DB.transactions.find(t=>t.id===s.id); if(old)bal-=effectOnCard(old,s.cardId);}
      if(bal - s.amount < 0){toast('Saldo insuficiente en '+card.name+' (débito)');return;}
    }
  }
  if(s.id){
    const t=DB.transactions.find(t=>t.id===s.id);
    Object.assign(t,{amount:s.amount,categoryId:s.categoryId,cardId:s.cardId,date:s.date,note:s.note,
      updatedAt:nowISO(),synced:false});
  } else {
    DB.transactions.push({id:uid(),kind:s.kind,amount:s.amount,categoryId:s.categoryId,cardId:s.cardId,
      toCardId:null,personId:null,date:s.date,note:s.note,createdAt:nowISO(),updatedAt:nowISO(),synced:false});
  }
  save(); closeSheet(); render(); toast(s.kind==='gasto'?'Gasto registrado':'Ingreso registrado');
}

function adjustSave(){
  const s=sheetState; const target=parseInt(($('#adjtarget').value||'0'),10)||0;
  const delta=target-s.current;
  if(delta!==0){
    DB.transactions.push({id:uid(),kind:'ajuste',amount:Math.abs(delta),increase:delta>0,
      categoryId:null,cardId:s.cardId,toCardId:null,personId:null,date:todayISO(),note:'Ajuste de saldo',
      createdAt:nowISO(),updatedAt:nowISO(),synced:false});

  renderXferForm();
}
function renderXferForm(){
  const s=sheetState;
  const opts=(sel)=>DB.cards.map(c=>'<option value="'+c.id+'" '+(sel===c.id?'selected':'')+'>'+esc(c.name)+' · '+clp(cardBalance(c.id))+'</option>').join('');
  let h='<div class="amount-display"><div class="cur">CLP</div><div class="num">'+
    (s.amount>0?clp(s.amount):'<span class="faint">$0</span>')+'</div></div>';
  h+='<div class="field"><label>Desde</label><select id="xfrom">'+opts(s.from)+'</select></div>';
  h+='<div class="field"><label>Hacia</label><select id="xto">'+opts(s.to)+'</select></div>';
  h+='<div class="keypad">'+
    ['1','2','3','4','5','6','7','8','9'].map(k=>'<button class="key" data-xk="'+k+'">'+k+'</button>').join('')+
    '<button class="key" data-xk="000">000</button><button class="key" data-xk="0">0</button>'+
    '<button class="key" data-xk="del">'+svg('chevron-left')+'</button></div>';
  h+='<button class="btn primary" id="xsave" '+(s.amount>0?'':'disabled')+'>Transferir</button>';
  $('#xferform').innerHTML=h;
}
function xferSave(){
  const s=sheetState;
  s.from=$('#xfrom').value; s.to=$('#xto').value;
  if(s.from===s.to){toast('Elige tarjetas distintas');return;}
  if(s.amount<=0)return;
  const fromCard=DB.cards.find(c=>c.id===s.from);
  if(fromCard&&fromCard.type==='debito'&&cardBalance(s.from)-s.amount<0){
    toast('Saldo insuficiente en '+fromCard.name);return;}
  DB.transactions.push({id:uid(),kind:'transferencia',amount:s.amount,categoryId:null,cardId:s.from,
    toCardId:s.to,personId:null,date:s.date,note:'',createdAt:nowISO(),updatedAt:nowISO(),synced:false});
  save(); closeSheet(); render(); toast('Transferencia realizada');
}

/* ---------- utilidades ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ---------- Delegación de eventos ---------- */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-period],[data-shift],[data-view],[data-go],[data-add],[data-mtab],'+
    '[data-editcat],[data-newcat],[data-editcard],[data-newcard],[data-dotransfer],[data-tx],'+
    '[data-pickcat],[data-pickcard],[data-k],[data-icon],[data-gray],[data-cardtype],[data-cardicon],'+
    '[data-xk],[data-go],[data-more],'+
    '[data-newdebt],[data-newperson],[data-person],[data-debtmove],[data-settle],[data-editperson],'+
    '[data-delperson],[data-debttx],[data-debtdir],[data-debtperson],[data-debtcard],[data-dk],[data-addcat]');

  /* botones con id directo */
  if(e.target.closest('#sheetClose')){closeSheet();return;}
  if(e.target.closest('#txsave')){txSaveCurrent();return;}
  if(e.target.closest('#txdelete')){const id=sheetState.id;DB.transactions=DB.transactions.filter(t=>t.id!==id);save();closeSheet();render();toast('Movimiento eliminado');return;}
  if(e.target.closest('#catsave')){catSave();return;}
  if(e.target.closest('#catdelete')){catDelete();return;}
  if(e.target.closest('#cardsave')){cardSave();return;}
  if(e.target.closest('#carddelete')){cardDelete();return;}
  if(e.target.closest('#cardadjust')){const c=DB.cards.find(c=>c.id===sheetState.id);openAdjustSheet(c);return;}
  if(e.target.closest('#adjsave')){adjustSave();return;}
  if(e.target.closest('#xsave')){xferSave();return;}
  if(e.target.closest('#personsave')){personSave();return;}
  if(e.target.closest('#debtsave')){debtSave();return;}

  if(!el)return;
  const d=el.dataset;
  if(d.period!=null){UI.period=d.period;render();}
  else if(d.shift!=null){shiftPeriod(parseInt(d.shift,10));}
  else if(d.view!=null){UI.view=d.view;render();}
  else if(d.go!=null){UI.view=d.go;if(d.mtab)UI.manageTab=d.mtab;render();}
  else if(d.add!=null){openTxSheet(d.add);}
  else if(d.mtab!=null){UI.manageTab=d.mtab;render();}
  else if(d.tx!=null){const t=DB.transactions.find(t=>t.id===d.tx);
    if(t.kind==='gasto'||t.kind==='ingreso')openTxSheet(t.kind,t);
    else if(t.kind==='transferencia')toast('Edición de transferencias: próximamente');
    else toast('Movimiento de ajuste');}
  else if(d.editcat!=null){openCatSheet(null,DB.categories.find(c=>c.id===d.editcat));}
  else if(d.newcat!=null){openCatSheet(d.newcat);}
  else if(d.editcard!=null){openCardSheet(DB.cards.find(c=>c.id===d.editcard));}
  else if(d.newcard!=null){openCardSheet();}
  else if(d.dotransfer!=null){openTransferSheet();}
  /* dentro de sheets */
  else if(d.pickcat!=null){sheetState.categoryId=d.pickcat;renderTxForm();}
  else if(d.pickcard!=null){sheetState.cardId=d.pickcard;renderTxForm();}
  else if(d.k!=null){keypad(d.k);}
  else if(d.xk!=null){keypadX(d.xk);}
  else if(d.icon!=null){sheetState.icon=d.icon;renderCatForm();}
  else if(d.gray!=null){sheetState.color=d.gray;renderCatForm();}
  else if(d.cardtype!=null){sheetState.type=d.cardtype;renderCardForm();}
  else if(d.cardicon!=null){sheetState.icon=d.cardicon;renderCardForm();}
  /* deudas */
  else if(d.newdebt!=null){if(!DB.people.length){openPersonEdit();}else{openDebtSheet('prestamo');}}
  else if(d.newperson!=null){openPersonEdit();}
  else if(d.person!=null){openPersonSheet(d.person);}
  else if(d.debtmove!=null){openDebtSheet(d.debtmove,d.pid);}
  else if(d.settle!=null){openSettleSheet(d.settle);}
  else if(d.editperson!=null){openPersonEdit(d.editperson);}
  else if(d.delperson!=null){personDelete(d.delperson);}
  else if(d.debttx!=null){toast('Edición de movimientos de deuda: próximamente');}
  else if(d.debtdir!=null){sheetState.dir=d.debtdir;renderDebtForm();}
  else if(d.debtperson!=null){sheetState.personId=d.debtperson;renderDebtForm();}
  else if(d.debtcard!=null){sheetState.cardId=(d.debtcard==='__none__'?'':d.debtcard);renderDebtForm();}
  else if(d.dk!=null){keypadD(d.dk);}
  else if(d.addcat!=null){openTxSheet('gasto',null,d.addcat);}
});
$('#scrim').addEventListener('click',closeSheet);

/* inputs dentro de sheets (capturar cambios sin re-render destructivo) */
document.addEventListener('input',e=>{
  if(e.target.id==='txdate')sheetState.date=e.target.value;
  else if(e.target.id==='txnote')sheetState.note=e.target.value;
  else if(e.target.id==='catname'){sheetState.name=e.target.value;
    const b=$('#catsave');if(b)b.disabled=!e.target.value.trim();}
  else if(e.target.id==='cardname'){sheetState.name=e.target.value;
    const b=$('#cardsave');if(b)b.disabled=!e.target.value.trim();}
  else if(e.target.id==='cardopening')sheetState.openingStr=e.target.value;
  else if(e.target.id==='personname'){sheetState.name=e.target.value;
    const b=$('#personsave');if(b)b.disabled=!e.target.value.trim();}
  else if(e.target.id==='debtdate')sheetState.date=e.target.value;
  else if(e.target.id==='debtnote')sheetState.note=e.target.value;
});

function keypad(k){
  const s=sheetState;
  if(k==='del')s.amount=Math.floor(s.amount/10);
  else if(k==='000')s.amount=s.amount*1000;
  else s.amount=s.amount*10+parseInt(k,10);
  if(s.amount>999999999)s.amount=999999999;
  renderTxForm();
}
function keypadX(k){
  const s=sheetState;
  s.from=$('#xfrom').value; s.to=$('#xto').value;
  if(k==='del')s.amount=Math.floor(s.amount/10);
  else if(k==='000')s.amount=s.amount*1000;
  else s.amount=s.amount*10+parseInt(k,10);
  if(s.amount>999999999)s.amount=999999999;
  renderXferForm();
}
function keypadD(k){
  const s=sheetState;
  if(k==='del')s.amount=Math.floor(s.amount/10);
  else if(k==='000')s.amount=s.amount*1000;
  else s.amount=s.amount*10+parseInt(k,10);
  if(s.amount>999999999)s.amount=999999999;
  renderDebtForm();
}

/* ---------- Service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
}

/* ---------- Arranque ---------- */
$('#sheetClose').innerHTML=svg('x');
render();
</script>
</body>
</html>
